<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Stocks Overview - H2Zero</title>
  <link rel="stylesheet" href="../assets/css/ui-modern.css">
  <style>
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .overview-card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 14px;
    }

    .overview-title {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }

    .overview-total {
      color: #9ecbff;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .overview-item {
      color: #dfe7f5;
      margin-bottom: 5px;
      font-size: 13px;
    }

    @media (max-width: 1200px) {
      .overview-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 800px) {
      .overview-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-card">
        <div class="brand-logo-wrap">
          <img src="../assets/images/h2zero-logo.jpg" alt="H2Zero Logo">
        </div>
        <div>
          <h2 class="brand-title">Norland</h2>
          <p class="brand-subtitle">Bottling Inc./p>
        </div>
      </div>

      <nav class="sidebar-nav">
  <a class="nav-link" href="dashboard.html"><span class="nav-label">Dashboard</span></a>
  <a class="nav-link" href="inventory.html"><span class="nav-label">Inventory Form</span></a>
  <a class="nav-link" href="reports.html"><span class="nav-label">Inventory Overview</span></a>
  <a class="nav-link" href="stocks.html"><span class="nav-label">Stocks Form</span></a>
  <a class="nav-link active" href="stocks-overview.html"><span class="nav-label">Stocks Overview</span></a>
  <a class="nav-link" href="create-staff.html"><span class="nav-label">Create Staff</span></a>
</nav>

      <div class="sidebar-footer">
        <button class="logout-btn" type="button">Logout</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <img src="../assets/images/h2zero-logo.jpg" alt="H2Zero Logo" class="topbar-logo">
          <p class="topbar-title">Norland Inventory Management System</p>
        </div>
        <div class="user-pill" id="userPill">Admin</div>
      </div>

      <div class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title">Stocks Overview</h1>
            <p class="page-subtitle">Overview of all available stocks.</p>
          </div>
          <div class="role-chip" id="userRoleText">Admin</div>
        </div>

        <div id="adminStocksOverview" class="overview-grid"></div>
      </div>
    </main>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/admin-stocks-overview.js"></script>
</body>
</html>
